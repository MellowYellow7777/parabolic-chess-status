name: Schedule Maintenance

on:
  workflow_dispatch:
    inputs:
      minutesUntilStart:
        description: 'Minutes until maintenance starts'
        default: '0'
        required: true
      message:
        description: 'Message'
        required: false

jobs:
  set-maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute maintenance JSON
        run:
          MESSAGE='${{ github.event.inputs.message }}'

          if [ "${{ github.event.inputs.minutesUntilStart }}" -eq 0 ]; then
            if [ -n "$MESSAGE" ]; then
              printf '{"state":"maintenance","start":"true","message":%s}\n' "$(jq -Rn --arg v "$MESSAGE" '$v')" > maintenance.json
            else
              echo '{"state":"maintenance","start":"true"}' > maintenance.json
            fi
          else
            START=$(date -u -d "+${{ github.event.inputs.minutesUntilStart }} minutes" +"%Y-%m-%dT%H:%M:%S.%3NZ")

            if [ -n "$MESSAGE" ]; then
              printf '{"state":"maintenance","start":"%s","message":%s}\n' "$START" "$(jq -Rn --arg v "$MESSAGE" '$v')" > maintenance.json
            else
              printf '{"state":"maintenance","start":"%s"}\n' "$START" > maintenance.json
            fi
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maintenance.json
          git commit -m "Update maintenance JSON"
          git push
